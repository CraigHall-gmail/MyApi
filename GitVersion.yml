tag-prefix: 'v'

branches:
  master:
    regex: ^main$
    tag: ''
    increment: Patch
    is-mainline: true
    prevent-increment-of-merged-branch-version: true
  develop:
    regex: ^development$
    tag: alpha
    increment: Minor
    track-merge-target: true
  feature:
    regex: ^feature[/-]
    tag: useBranchName
    increment: Inherit
  hotfix:
    regex: ^hotfix[/-]
    tag: ''
    increment: Patch
    is-release-branch: true
