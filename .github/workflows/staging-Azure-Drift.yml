# ══════════════════════════════════════════════════════════════════════════════
# staging-Platform-Drift.yml  –  Nightly Infrastructure Drift Check (Staging)
# ══════════════════════════════════════════════════════════════════════════════
#
# Detects drift between the Terraform state and actual Azure infrastructure for
# the staging environment. Plan-only — never applies changes.
#
# Alerting:
#   Drift detected  (exit code 2) → creates/updates a GitHub Issue labelled
#                   'infrastructure-drift'
#   Plan error      (exit code 1) → creates/updates a GitHub Issue
#   No drift        (exit code 0) → closes any open drift issues
# ══════════════════════════════════════════════════════════════════════════════

name: Scheduled - Staging Drift Check

on:
  schedule:
    - cron: '30 1 * * *'   # 01:30 UTC every night (staggered from dev at 01:00)
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  issues: write

concurrency:
  group: drift-check-staging
  cancel-in-progress: true

jobs:
  drift-check:
    name: Drift Check (staging)
    runs-on: ubuntu-latest
    environment: staging
    defaults:
      run:
        working-directory: infra/staging

    env:
      ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC:        "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.0"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="storage_account_name=myapiterraformstate" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=staging/api.tfstate" \
            -backend-config="use_oidc=true"

      - name: Terraform Plan (drift detection)
        id: plan
        run: |
          terraform plan \
            -var-file="terraform.tfvars" \
            -detailed-exitcode \
            -lock-timeout=2m
        continue-on-error: true

      - name: Manage drift issue
        uses: actions/github-script@v7
        with:
          script: |
            const LABEL   = 'infrastructure-drift';
            const exitcode = '${{ steps.plan.outputs.exitcode }}';
            const runUrl   = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const now      = new Date().toISOString();

            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                name:  LABEL,
                color: 'd93f0b',
                description: 'Azure infrastructure has drifted from Terraform state'
              });
            } catch (_) {}

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner:  context.repo.owner,
              repo:   context.repo.repo,
              labels: LABEL,
              state:  'open'
            });

            const MAX = 60000;
            let planOut = `${{ steps.plan.outputs.stdout }}`;
            if (planOut.length > MAX) {
              planOut = planOut.slice(0, MAX) + '\n\n…output truncated — see full run logs';
            }

            if (exitcode === '2') {
              const body = [
                `### ⚠️ Infrastructure Drift Detected — \`staging\``,
                ``,
                `Terraform found changes between the state file and the actual Azure infrastructure.`,
                `**Workflow run:** ${runUrl}`,
                `**Detected at:** ${now}`,
                ``,
                `\`\`\``,
                planOut,
                `\`\`\``
              ].join('\n');

              if (openIssues.length > 0) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: openIssues[0].number,
                  body: `### Drift still present — ${now}\n\n**Run:** ${runUrl}\n\n\`\`\`\n${planOut}\n\`\`\``
                });
              } else {
                const { data: issue } = await github.rest.issues.create({
                  owner: context.repo.owner, repo: context.repo.repo,
                  title: `⚠️ Infrastructure Drift Detected — staging`,
                  body, labels: [LABEL]
                });
                console.log(`Opened drift issue #${issue.number}`);
              }

            } else if (exitcode === '1') {
              const body = [
                `### 🔴 Terraform Plan Error — \`staging\``,
                ``,
                `The nightly drift check failed to produce a plan. Manual investigation required.`,
                `**Workflow run:** ${runUrl}`,
                `**Occurred at:** ${now}`,
                ``,
                `\`\`\``,
                planOut || '(no output captured — check the workflow logs)',
                `\`\`\``
              ].join('\n');

              if (openIssues.length > 0) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: openIssues[0].number,
                  body: `### Plan error — ${now}\n\n**Run:** ${runUrl}\n\n\`\`\`\n${planOut}\n\`\`\``
                });
              } else {
                const { data: issue } = await github.rest.issues.create({
                  owner: context.repo.owner, repo: context.repo.repo,
                  title: `🔴 Terraform Plan Error — staging`,
                  body, labels: [LABEL]
                });
                console.log(`Opened plan error issue #${issue.number}`);
              }
              core.setFailed('Terraform plan returned exit code 1');

            } else {
              console.log('No drift detected.');
              for (const issue of openIssues) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `✅ No drift detected as of ${now} — closing.\n\n**Workflow run:** ${runUrl}`
                });
                await github.rest.issues.update({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed'
                });
                console.log(`Closed resolved drift issue #${issue.number}`);
              }
            }
