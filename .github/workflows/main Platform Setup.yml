name: Deploy – Platform Dev

on:
  push:
    branches: [main]
    paths:
      - 'infra/development/**'
  pull_request:
    paths:
      - 'infra/development/**'
  workflow_dispatch:
    inputs:
      destroy:
        description: "Destroy resources?"
        type: boolean
        default: false

jobs:
  deploy:
    uses: ./.github/workflows/_shared-aca-dev.yml
    with:
      environment:        dev
      working_directory:  infra/development
      tf_version:         "1.8.0"
      destroy:            ${{ inputs.destroy || false }}
    secrets:
      AZURE_CLIENT_ID:        ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID:        ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID:  ${{ secrets.AZURE_SUBSCRIPTION_ID }}
