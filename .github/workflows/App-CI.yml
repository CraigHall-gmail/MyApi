# ══════════════════════════════════════════════════════════════════════════════
# App-CI.yml  –  CI/CD: Build, Test, Scan & Deploy
# ══════════════════════════════════════════════════════════════════════════════
#
# Purpose:
#   Single CI/CD pipeline for all application branches. Validates every
#   push/PR, builds and pushes the Docker image on merge, then deploys to
#   the environment that matches the branch.
#
# Branching strategy:
#   feature/*  →  PR targets development  →  merge to development
#   hotfix/*   →  PR targets main         →  merge to main
#
# Triggers:
#   • push → feature/**   →  test only (no build or deploy)
#   • push → development  →  test → build → deploy-dev
#   • push → hotfix/**    →  test → build → deploy-staging → deploy-production
#   • push → main         →  test → build → deploy-staging → deploy-production
#   • pull_request        →  test only (no build or deploy)
#   • workflow_dispatch   →  test + build on whichever branch is selected
#
# Job flow:
#   build-test-scan ──► build-push ──► deploy-dev                           (development branch)
#                                  └─► deploy-staging ──► deploy-production  (main + hotfix/* branches)
#
# Environment / OIDC mapping:
#   development branch  →  build-push uses environment: development
#   main branch         →  build-push uses environment: build
#   hotfix/* branches   →  build-push uses environment: build
#                          (build service principal has AcrPush on the shared registry)
#
# Approval gate (production):
#   Configure "Required reviewers" on the `production` GitHub Environment in
#   Settings → Environments → production. No extra workflow logic required.
#
# Required secrets (environment-scoped):
#   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#   SONAR_TOKEN
# ══════════════════════════════════════════════════════════════════════════════

name: App - CI (Build, Test & Deploy)

on:
  push:
    branches:
      - development
      - main
      - 'feature/**'
      - 'hotfix/**'
    paths-ignore:
      - '.github/workflows/**'
  pull_request:
    branches: [development, main]
  workflow_dispatch:

permissions:
  contents: read

env:
  ACR_NAME:   acrimagereg
  IMAGE_NAME: myapi

jobs:
  # ── Job 1: Build, Test & Scan ─────────────────────────────────────────────
  # Runs on every push and PR. Must pass before any image is built or deployed.
  build-test-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write  # SonarCloud PR decoration
      checks: write         # dorny/test-reporter
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0  # Full history required for SonarCloud blame data and new-code detection

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Install tools
        run: |
          dotnet tool install --global dotnet-sonarscanner
         
      - name: Restore
        run: dotnet restore

      - name: SonarCloud Begin
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dotnet sonarscanner begin \
            /k:"CraigHall-gmail_MyApi" \
            /o:"craighall-gmail" \
            /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.branch.longLivedBranchesRegex="(main|master|development|release/.*)" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.qualitygate.wait=${{ github.ref == 'refs/heads/main' || github.event_name == 'pull_request' }} \
            /d:sonar.coverage.exclusions="Data/**,Models/**" \
            /d:sonar.exclusions=".github/**,.vscode/**,**/appsettings*.json,Dockerfile" \
            /d:sonar.cs.cobertura.reportPaths=coverage.cobertura.xml

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test with coverage
        run: |
          dotnet test --no-build -c Release \
            --collect:"XPlat Code Coverage" \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory ./test-results

      - name: Copy coverage report
        run: |
          COVERAGE=$(find ./test-results -name "coverage.cobertura.xml" | head -1)
          if [ -z "$COVERAGE" ]; then
            echo "::error::No coverage.cobertura.xml found — check test output"
            exit 1
          fi
          echo "Found: $COVERAGE"
          cp "$COVERAGE" ./coverage.cobertura.xml
            
      - name: Copy coverage report to known path
        run: |
          COVERAGE=$(find ./test-results -name "coverage.cobertura.xml" | head -1)
          if [ -z "$COVERAGE" ]; then
            echo "::error::No coverage.cobertura.xml found in test-results"
            exit 1
          fi
          echo "Found coverage report: $COVERAGE"
          cp "$COVERAGE" ./coverage.cobertura.xml

      - name: SonarCloud End
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"

      - name: Publish Unit Test Results
        uses: dorny/test-reporter@3eeb9fc888e82e8be2fb356bbeec2750231672bc # v1
        if: always()
        with:
          name: Unit Tests
          path: ./test-results/*.trx
          reporter: dotnet-trx

  # ── Job 2: Build & Push ───────────────────────────────────────────────────
  # Skipped on pull requests and feature branches. Uses the environment matching
  # the branch so OIDC federation is scoped to the correct service principal.
  #   development → environment: development
  #   main        → environment: build  (build SP has AcrPush)
  #   hotfix/*    → environment: build  (same SP — hotfix deploys independently of main)
  build-push:
    needs: build-test-scan
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'pull_request' &&
      (github.ref == 'refs/heads/development' ||
       github.ref == 'refs/heads/main' ||
       startsWith(github.ref, 'refs/heads/hotfix/'))
    environment: ${{ (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/hotfix/')) && 'build' || 'development' }}
    permissions:
      id-token: write
      contents: read
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
      version:   ${{ steps.gitversion.outputs.semVer }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0  # GitVersion requires full history

      - name: Setup GitVersion
        uses: gittools/actions/gitversion/setup@51d325634925d7d9ce0a7efc2c586c0bc2b9eee6 # v3.2.1
        with:
          versionSpec: '5.x'

      - name: Determine version
        id: gitversion
        uses: gittools/actions/gitversion/execute@51d325634925d7d9ce0a7efc2c586c0bc2b9eee6 # v3.2.1
        with:
          useConfigFile: true

      - name: Azure login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set image tag
        id: meta
        run: |
          TAG="${{ github.sha }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Image tag: $TAG"

      - name: Build and push to ACR
        run: |
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }} \
            --image ${{ env.IMAGE_NAME }}:${{ steps.gitversion.outputs.semVer }} \
            --build-arg VERSION=${{ steps.gitversion.outputs.semVer }} \
            .

      - name: Output image references
        run: |
          echo "SHA tag   : ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}"
          echo "Semver tag: ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ steps.gitversion.outputs.semVer }}"

  # ── Job 3: Deploy → Development ──────────────────────────────────────────
  deploy-dev:
    needs: build-push
    if: github.ref == 'refs/heads/development'
    permissions:
      id-token: write
      contents: write
    uses: ./.github/workflows/_shared-cd.yml
    with:
      environment:    development
      app_name:       myapi-dev
      image_sha:      ${{ needs.build-push.outputs.image-tag }}
      version:        ${{ needs.build-push.outputs.version }}
      resource_group: rg-myapi-dev
      key_vault_name: kv-myapi-dev
    secrets:
      AZURE_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  # ── Job 4: Deploy → Staging ───────────────────────────────────────────────
  # Runs on main merges and hotfix branches. Hotfix deploys bypass main so a
  # pending next-version in staging is not bundled with the emergency fix.
  deploy-staging:
    needs: build-push
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/hotfix/')
    permissions:
      id-token: write
      contents: write
    uses: ./.github/workflows/_shared-cd.yml
    with:
      environment:    staging
      app_name:       myapi-stg
      image_sha:      ${{ needs.build-push.outputs.image-tag }}
      version:        ${{ needs.build-push.outputs.version }}
      resource_group: rg-myapi-staging
      key_vault_name: kv-myapi-stg
    secrets:
      AZURE_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  # ── Job 5: Deploy → Production ────────────────────────────────────────────
  # Runs only after staging succeeds. The `production` GitHub Environment's
  # "Required reviewers" protection rule pauses execution until approved.
  # Applies to both main and hotfix/* branches.
  deploy-production:
    needs: [build-push, deploy-staging]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/hotfix/')
    permissions:
      id-token: write
      contents: write
    uses: ./.github/workflows/_shared-cd.yml
    with:
      environment:    production
      image_sha:      ${{ needs.build-push.outputs.image-tag }}
      version:        ${{ needs.build-push.outputs.version }}
      resource_group: rg-myapi-production
      key_vault_name: kv-myapi-prd
    secrets:
      AZURE_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
