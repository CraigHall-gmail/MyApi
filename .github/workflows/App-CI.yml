# ══════════════════════════════════════════════════════════════════════════════
# App-CI.yml  –  CI/CD: Build, Test, Scan & Deploy
# ══════════════════════════════════════════════════════════════════════════════
#
# Purpose:
#   Single CI/CD pipeline for all application branches. Validates every
#   push/PR, builds and pushes the Docker image on merge, then deploys to
#   the environment that matches the branch.
#
# Triggers:
#   • push → development  →  test → build → deploy-dev
#   • push → main         →  test → build → deploy-staging → deploy-production
#   • pull_request        →  test only (no build or deploy)
#   • workflow_dispatch   →  test + build on whichever branch is selected
#
# Job flow:
#   build-test-scan ──► build-push ──► deploy-dev          (development branch)
#                                  └─► deploy-staging ──► deploy-production  (main branch)
#
# Environment / OIDC mapping:
#   development branch  →  build-push uses environment: development
#   main branch         →  build-push uses environment: staging
#                          (staging service principal has AcrPush on the shared registry)
#
# Approval gate (production):
#   Configure "Required reviewers" on the `production` GitHub Environment in
#   Settings → Environments → production. No extra workflow logic required.
#
# Required secrets (environment-scoped):
#   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#   SONAR_TOKEN
# ══════════════════════════════════════════════════════════════════════════════

name: App - CI (Build, Test & Deploy)

on:
  push:
    branches: [development, main]
    paths-ignore:
      - 'infra/**'
      - '.github/workflows/**'
  pull_request:
    branches: [development, main]
    paths-ignore:
      - 'infra/**'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read

env:
  ACR_NAME:   acrimagereg
  IMAGE_NAME: myapi

jobs:
  # ── Job 1: Build, Test & Scan ─────────────────────────────────────────────
  # Runs on every push and PR. Must pass before any image is built or deployed.
  build-test-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write  # SonarCloud PR decoration
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0  # Full history required for SonarCloud blame data and new-code detection

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Install SonarScanner for .NET
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Restore
        run: dotnet restore

      - name: SonarCloud Begin
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dotnet sonarscanner begin \
            /k:"CraigHall-gmail_MyApi" \
            /o:"craighall-gmail" \
            /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.host.url="https://sonarcloud.io"

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --logger trx --collect:"XPlat Code Coverage"

      - name: SonarCloud End
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"

      - name: Publish test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: test-results
          path: '**/*.trx'

  # ── Job 2: Build & Push ───────────────────────────────────────────────────
  # Skipped on pull requests. Uses the environment matching the branch so OIDC
  # federation is scoped to the correct service principal.
  #   development → environment: development
  #   main        → environment: staging  (staging SP has AcrPush)
  build-push:
    needs: build-test-scan
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    environment: ${{ github.ref == 'refs/heads/main' && 'staging' || 'development' }}
    permissions:
      id-token: write
      contents: read
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
      version:   ${{ steps.semver.outputs.version }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Read semantic version from project
        id: semver
        run: |
          VERSION=$(grep -oP '(?<=<Version>)[^<]+' MyApi.csproj | head -1)
          if [ -z "$VERSION" ]; then
            echo "::error::No <Version> element found in MyApi.csproj"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Semantic version: $VERSION"

      - name: Azure login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set image tag
        id: meta
        run: |
          TAG="${{ github.sha }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Image tag: $TAG"

      - name: Build and push to ACR
        run: |
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }} \
            --image ${{ env.IMAGE_NAME }}:${{ steps.semver.outputs.version }} \
            .

      - name: Output image references
        run: |
          echo "SHA tag   : ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}"
          echo "Semver tag: ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ steps.semver.outputs.version }}"

  # ── Job 3: Deploy → Development ──────────────────────────────────────────
  deploy-dev:
    needs: build-push
    if: github.ref == 'refs/heads/development'
    permissions:
      id-token: write
      contents: write
    uses: ./.github/workflows/_shared-cd.yml
    with:
      environment:    development
      app_name:       myapi-dev
      image_sha:      ${{ needs.build-push.outputs.image-tag }}
      version:        ${{ needs.build-push.outputs.version }}
      resource_group: rg-myapi-dev
      key_vault_name: kv-myapi-dev
    secrets:
      AZURE_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  # ── Job 4: Deploy → Staging ───────────────────────────────────────────────
  # Runs automatically on every merge to main.
  deploy-staging:
    needs: build-push
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: write
    uses: ./.github/workflows/_shared-cd.yml
    with:
      environment:    staging
      app_name:       myapi-stg
      image_sha:      ${{ needs.build-push.outputs.image-tag }}
      version:        ${{ needs.build-push.outputs.version }}
      resource_group: rg-myapi-staging
      key_vault_name: kv-myapi-stg
    secrets:
      AZURE_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  # ── Job 5: Deploy → Production ────────────────────────────────────────────
  # Runs only after staging succeeds. The `production` GitHub Environment's
  # "Required reviewers" protection rule pauses execution until approved.
  deploy-production:
    needs: [build-push, deploy-staging]
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: write
    uses: ./.github/workflows/_shared-cd.yml
    with:
      environment:    production
      image_sha:      ${{ needs.build-push.outputs.image-tag }}
      version:        ${{ needs.build-push.outputs.version }}
      resource_group: rg-myapi-production
      key_vault_name: kv-myapi-prd
    secrets:
      AZURE_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
