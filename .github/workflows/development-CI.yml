name: development CI - Build & Push to ACR

on:
  push:
    branches: [development]
    paths-ignore:
      - 'infra/**'
  pull_request:
    branches: [development]
    paths-ignore:
      - 'infra/**'
  workflow_dispatch:

env:
  ACR_NAME: acrimagereg
  IMAGE_NAME: myapi

jobs:
  # ── Job 1: Test ──────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --logger trx
        continue-on-error: false

  # ── Job 2: Build & Push ──────────────────────
  build-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/development'  # only on branch push, not PRs
    environment: development
    permissions:
      id-token: write      # required for OIDC
      contents: read
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set image tag
        id: meta
        run: |
          TAG=${{ github.sha }}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Image tag: $TAG"

      - name: Build and push to ACR
        run: |
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }} \
            --image ${{ env.IMAGE_NAME }}:latest \
            .

      - name: Output image reference
        run: |
          echo "Pushed: ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}"
