# ══════════════════════════════════════════════════════════════════════════════
# development-CI.yml  –  Continuous Integration: Build & Push to ACR
# ══════════════════════════════════════════════════════════════════════════════
#
# Purpose:
#   Validates every push/PR to the development branch and, on a successful
#   merge, builds the Docker image via ACR Tasks and hands off to the CD
#   workflow for blue/green deployment.
#
# Triggers:
#   • push → development  (excluding infra/** — Terraform has its own pipeline)
#   • pull_request → development  (runs test job only; image is NOT pushed)
#   • workflow_dispatch  (manual run; only test + build-push on development)
#
# Job flow:
#   test ──► build-push ──► deploy  (calls development-CD.yml)
#              ▲ skipped on PRs
#
# Required GitHub environment secrets (environment: development):
#   AZURE_CLIENT_ID       – App Registration client ID for OIDC federation
#   AZURE_TENANT_ID       – Azure AD tenant ID
#   AZURE_SUBSCRIPTION_ID – Target Azure subscription ID
#
# OIDC federated identity must be configured on the App Registration for:
#   subject: repo:<org>/<repo>:environment:development
#
# Image naming convention:
#   <ACR_NAME>.azurecr.io/<IMAGE_NAME>:<full-git-sha>  – immutable, always pushed
#   <ACR_NAME>.azurecr.io/<IMAGE_NAME>:<semver>         – mutable pointer to latest build of that version
#   The `latest` tag is intentionally NOT pushed — all deployments reference
#   the SHA tag to guarantee traceability and safe rollbacks.
#
# Semantic versioning:
#   The version is read from <Version> in MyApi.csproj and must be bumped
#   manually (following semver: MAJOR.MINOR.PATCH) before merging a release.
#   This version drives both the ACR image tag and the ACA revision suffix,
#   making deployed revisions identifiable as e.g. myapi--v1-0-0-abc1234.
# ══════════════════════════════════════════════════════════════════════════════

name: development CI - Build & Push to ACR

on:
  push:
    branches: [development]
    paths-ignore:
      - 'infra/**'
  pull_request:
    branches: [development]
    paths-ignore:
      - 'infra/**'
  workflow_dispatch:

permissions:
  contents: read

env:
  ACR_NAME: acrimagereg
  IMAGE_NAME: myapi

jobs:
  # ── Job 1: Test ──────────────────────────────────────────────────────────────
  # Runs on every push and PR. Gate that must pass before any image is built.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          # Cache key includes all .csproj files — any project change busts the cache.
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --logger trx

      - name: Publish test results
        # Always upload so failures are visible in the GitHub Actions UI.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/*.trx'

  # ── Job 2: Build & Push ──────────────────────────────────────────────────────
  # Only runs when code is merged to development (not on pull requests).
  # Uses `az acr build` which runs the Docker build inside Azure — no Docker
  # daemon needed on the runner and the image never leaves Azure's network.
  build-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/development'  # skip on PRs
    environment: development
    permissions:
      id-token: write      # required for OIDC token exchange
      contents: read
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
      version:   ${{ steps.semver.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Read semantic version from project
        id: semver
        run: |
          VERSION=$(grep -oP '(?<=<Version>)[^<]+' MyApi.csproj | head -1)
          if [ -z "$VERSION" ]; then
            echo "::error::No <Version> element found in MyApi.csproj"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Semantic version: $VERSION"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set image tag
        id: meta
        run: |
          TAG="${{ github.sha }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Image tag: $TAG"

      - name: Build and push to ACR
        run: |
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }} \
            --image ${{ env.IMAGE_NAME }}:${{ steps.semver.outputs.version }} \
            .

      - name: Output image references
        run: |
          echo "SHA tag  : ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}"
          echo "Semver tag: ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ steps.semver.outputs.version }}"

  # ── Job 3: Deploy ────────────────────────────────────────────────────────────
  # Calls the CD workflow as a reusable workflow, passing the image SHA and
  # semantic version. Runs only on development branch merges.
  deploy:
    needs: build-push
    if: github.ref == 'refs/heads/development'
    permissions:
      id-token: write   # CD workflow only needs OIDC; no checkout required
    uses: ./.github/workflows/development-CD.yml
    with:
      image_sha: ${{ needs.build-push.outputs.image-tag }}
      version:   ${{ needs.build-push.outputs.version }}
    secrets: inherit
