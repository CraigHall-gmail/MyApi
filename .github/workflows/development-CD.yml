# ══════════════════════════════════════════════════════════════════════════════
# development-CD.yml  –  Development CD: Manual Blue/Green Deploy
# ══════════════════════════════════════════════════════════════════════════════
#
# Purpose:
#   Manual dispatch wrapper for deploying to the development environment.
#   Also acts as a workflow_call target so development-CI.yml can invoke the
#   CD step without duplicating inputs.
#
#   All deployment logic lives in _shared-cd.yml. This file exists to:
#     1. Expose a workflow_dispatch trigger for ad-hoc dev deployments
#     2. Hard-code the development-specific resource group and environment
#        so callers don't need to know infra details
#
# Triggers:
#   • workflow_call  – called by development-CI.yml after a successful image push
#   • workflow_dispatch  – manual deploy of any specific image SHA
#
# For staging and production deployments, see main-CI.yml which calls
# _shared-cd.yml directly with the appropriate environment inputs.
# ══════════════════════════════════════════════════════════════════════════════

name: Development CD – Blue/Green Deploy

on:
  workflow_call:
    inputs:
      image_sha:
        required: true
        type: string
      version:
        required: false
        type: string
        description: "Semantic version from MyApi.csproj (e.g. 1.0.0)"
  workflow_dispatch:
    inputs:
      image_sha:
        description: "Full image SHA to deploy"
        required: true
        type: string
      version:
        description: "Semantic version (e.g. 1.0.0) — used for revision suffix"
        required: false
        type: string

permissions:
  id-token: write

jobs:
  deploy:
    uses: ./.github/workflows/_shared-cd.yml
    with:
      environment:    development
      image_sha:      ${{ inputs.image_sha }}
      version:        ${{ inputs.version || '' }}
      resource_group: rg-myapi-dev
    secrets: inherit
