# ══════════════════════════════════════════════════════════════════════════════
# main-CI.yml  –  CI/CD: Build → Staging → Production
# ══════════════════════════════════════════════════════════════════════════════
#
# Purpose:
#   Full CI/CD pipeline for the main branch. Validates every push/PR, builds
#   the image on merge, deploys to staging automatically, then to production
#   after staging succeeds — with a manual approval gate enforced by the
#   `production` GitHub Environment's protection rules.
#
# Triggers:
#   • push → main  (excluding infra/** and .github/workflows/**)
#   • pull_request → main  (test only — no image build or deploy)
#   • workflow_dispatch  (manual; test + build on main branch only)
#
# Job flow (on push to main):
#   test ──► build-push ──► deploy-staging ──► deploy-production
#                                ▲ automatic        ▲ requires manual approval
#                                                     (production env gate)
#
# Approval gate:
#   Configure "Required reviewers" on the `production` GitHub Environment in
#   Settings → Environments → production. The workflow requires no extra code
#   — the environment protection rule pauses execution before deploy-production.
#
# OIDC federation required per environment:
#   staging:    repo:<org>/<repo>:environment:staging
#   production: repo:<org>/<repo>:environment:production
#
# Secrets (environment-scoped in GitHub):
#   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#   Set as environment-level secrets so staging and production can use
#   different service principals with appropriately scoped RBAC.
# ══════════════════════════════════════════════════════════════════════════════

name: Main CI – Build, Staging & Production Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'infra/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'infra/**'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read

env:
  ACR_NAME:   acrimagereg
  IMAGE_NAME: myapi

jobs:
  # ── Job 1: Test ──────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --logger trx

      - name: Publish test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/*.trx'

  # ── Job 2: Build & Push ──────────────────────────────────────────────────────
  # Uses the `staging` environment so OIDC federation is scoped to the staging
  # service principal, which has AcrPush on the shared registry.
  build-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: staging
    permissions:
      id-token: write
      contents: read
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
      version:   ${{ steps.semver.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Read semantic version from project
        id: semver
        run: |
          VERSION=$(grep -oP '(?<=<Version>)[^<]+' MyApi.csproj | head -1)
          if [ -z "$VERSION" ]; then
            echo "::error::No <Version> element found in MyApi.csproj"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Semantic version: $VERSION"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set image tag
        id: meta
        run: |
          TAG="${{ github.sha }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Image tag: $TAG"

      - name: Build and push to ACR
        run: |
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }} \
            --image ${{ env.IMAGE_NAME }}:${{ steps.semver.outputs.version }} \
            .

      - name: Output image references
        run: |
          echo "SHA tag   : ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}"
          echo "Semver tag: ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ steps.semver.outputs.version }}"

  # ── Job 3: Deploy → Staging ──────────────────────────────────────────────────
  # Runs automatically on every merge to main. No manual gate.
  deploy-staging:
    needs: build-push
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
    uses: ./.github/workflows/_shared-cd.yml
    with:
      environment:    staging
      image_sha:      ${{ needs.build-push.outputs.image-tag }}
      version:        ${{ needs.build-push.outputs.version }}
      resource_group: rg-myapi-staging
    secrets: inherit

  # ── Job 4: Deploy → Production ───────────────────────────────────────────────
  # Runs only after staging succeeds. The `production` GitHub Environment's
  # "Required reviewers" protection rule pauses execution here until approved.
  # No approval = no deploy, regardless of staging success.
  deploy-production:
    needs: [build-push, deploy-staging]
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
    uses: ./.github/workflows/_shared-cd.yml
    with:
      environment:    production
      image_sha:      ${{ needs.build-push.outputs.image-tag }}
      version:        ${{ needs.build-push.outputs.version }}
      resource_group: rg-myapi-production
    secrets: inherit
