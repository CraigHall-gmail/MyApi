# ══════════════════════════════════════════════════════════════════════════════
# _shared-cd.yml  –  Shared Reusable Workflow: Blue/Green Deploy to ACA
# ══════════════════════════════════════════════════════════════════════════════
#
# Purpose:
#   Reusable workflow (workflow_call only) that executes a full blue/green
#   deployment to Azure Container Apps. Callers supply the target environment,
#   image SHA, and resource details. The GitHub Environment specified via
#   `environment` input enforces any protection rules (e.g. required reviewers
#   for production) automatically — no extra logic needed in this workflow.
#
# Callers:
#   App-CI.yml  →  environment: development / staging / production
#
# Deployment sequence:
#   0. Run EF migrations against the target database (via ef-migrate.yml)
#   1. Deploy new (green) revision at 0% traffic
#   2. Poll until the revision reaches Running state  (max ~200 s)
#   3. Retrieve the revision-specific FQDN and run smoke tests
#   4. Shift 100% of ingress traffic to the green revision
#   5. Deactivate old revisions (keeping the most recent one for rollback)
#   6. [On failure] Deactivate the green revision to revert to prior state
#
# Inputs:
#   environment    (required) GitHub environment name; gates approval rules
#   image_sha      (required) Full image SHA to deploy
#   version        (optional) Semantic version for the revision suffix
#   app_name       (optional) Container App name              [myapi]
#   resource_group (required) Resource group of the Container App
#   acr_name       (optional) Azure Container Registry name   [acrimagereg]
#   key_vault_name (required) Azure Key Vault holding db-connection-string
#
# Secrets (passed from caller):
#   AZURE_CLIENT_ID / AZURE_TENANT_ID / AZURE_SUBSCRIPTION_ID
# ══════════════════════════════════════════════════════════════════════════════

name: _Shared – CD (Blue/Green Deploy)

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: "GitHub environment name (development/staging/production)"
      image_sha:
        required: true
        type: string
        description: "Full image SHA to deploy"
      version:
        required: false
        type: string
        description: "Semantic version from MyApi.csproj (e.g. 1.0.0)"
      app_name:
        required: false
        type: string
        default: myapi
        description: "Container App name"
      resource_group:
        required: true
        type: string
        description: "Resource group containing the Container App"
      acr_name:
        required: false
        type: string
        default: acrimagereg
        description: "Azure Container Registry name"
      image_name:
        required: false
        type: string
        default: myapi
        description: "Image repository name in ACR (may differ from app_name)"
      key_vault_name:
        required: true
        type: string
        description: "Azure Key Vault name holding the db-connection-string secret"
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true

# One deploy per environment at a time. Queues rather than cancels to prevent
# concurrent revisions corrupting traffic weights.
concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  # ── Job 1: Apply EF migrations before any new revision starts ────────────
  migrate:
    uses: ./.github/workflows/App-EF-Migrate.yml
    permissions:
      id-token: write
      contents: read
    with:
      environment:    ${{ inputs.environment }}
      key_vault_name: ${{ inputs.key_vault_name }}
    secrets:
      AZURE_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  # ── Job 2: Blue/Green deploy ──────────────────────────────────────────────
  deploy:
    name: Deploy (${{ inputs.environment }})
    needs: migrate
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC — Azure login
      contents: write   # push git tags on production deploy

    env:
      IMAGE_SHA:         ${{ inputs.image_sha }}
      INPUT_VERSION:     ${{ inputs.version }}
      INPUT_ENVIRONMENT: ${{ inputs.environment }}
      APP_NAME:          ${{ inputs.app_name }}
      RESOURCE_GROUP:    ${{ inputs.resource_group }}
      ACR_NAME:          ${{ inputs.acr_name }}
      IMAGE_NAME:        ${{ inputs.image_name }}
      KEY_VAULT_NAME:    ${{ inputs.key_vault_name }}

    steps:
      - name: Azure login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── Step 0: Fetch connection string from Key Vault ────────────────────
      - name: Fetch DB connection string from Key Vault
        id: kv
        run: |
          CONN=$(az keyvault secret show \
            --vault-name "$KEY_VAULT_NAME" \
            --name "db-connection-string" \
            --query value -o tsv)
          echo "::add-mask::$CONN"
          echo "connection_string=$CONN" >> "$GITHUB_OUTPUT"

      # ── Step 1: Deploy GREEN revision at 0% traffic ───────────────────────
      - name: Deploy green revision (0% traffic)
        id: deploy-green
        env:
          CONNECTION_STRING: ${{ steps.kv.outputs.connection_string }}
        run: |
          SHA="$IMAGE_SHA"
          VERSION="$INPUT_VERSION"
          SHORT_SHA=${SHA:0:7}

          if [ -n "$VERSION" ]; then
            REVISION_SUFFIX="v${VERSION//./'-'}-${SHORT_SHA}"
          else
            REVISION_SUFFIX="sha-${SHORT_SHA}"
          fi

          echo "Revision suffix: $REVISION_SUFFIX"

          # Capitalise first letter of environment name → Development | Staging | Production
          ASPNET_ENV="${INPUT_ENVIRONMENT^}"

          az containerapp update \
            --name      "$APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --image     "$ACR_NAME.azurecr.io/$IMAGE_NAME:${SHA}" \
            --revision-suffix "$REVISION_SUFFIX" \
            --set-env-vars "REVISION_LABEL=${REVISION_SUFFIX}" \
            --set-env-vars "ASPNETCORE_ENVIRONMENT=${ASPNET_ENV}" \
            --set-env-vars "ConnectionStrings__DefaultConnection=$CONNECTION_STRING"

          echo "revision=$APP_NAME--${REVISION_SUFFIX}" >> "$GITHUB_OUTPUT"

      # ── Step 2: Wait for green revision to reach Running state ────────────
      - name: Wait for green revision to be running
        run: |
          for i in {1..20}; do
            STATUS=$(az containerapp revision show \
              --name           "$APP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --revision       "${{ steps.deploy-green.outputs.revision }}" \
              --query properties.runningState -o tsv)
            echo "Revision state: $STATUS"
            [ "$STATUS" = "Running" ] && break
            sleep 10
          done
          if [ "$STATUS" != "Running" ]; then
            echo "Revision failed to reach Running state"
            exit 1
          fi

      # ── Step 3: Smoke test via per-revision URL (zero production traffic) ─
      - name: Get green revision URL
        id: revision-url
        run: |
          FQDN=$(az containerapp revision show \
            --name           "$APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --revision       "${{ steps.deploy-green.outputs.revision }}" \
            --query properties.fqdn -o tsv)
          echo "url=https://${FQDN}" >> "$GITHUB_OUTPUT"

      - name: Smoke test green revision
        run: |
          curl --fail --retry 6 --retry-delay 10 \
            "${{ steps.revision-url.outputs.url }}/health/ready"
          curl --fail --retry 6 --retry-delay 10 \
            "${{ steps.revision-url.outputs.url }}/version"

      # ── Step 4: Promote green to 100% traffic ────────────────────────────
      - name: Promote green to 100% traffic
        run: |
          az containerapp ingress traffic set \
            --name           "$APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --revision-weight "${{ steps.deploy-green.outputs.revision }}=100"

      # ── Step 5: Deactivate old revisions (keep 1 for rollback) ───────────
      # continue-on-error: post-promotion housekeeping must not roll back a live revision.
      - name: Deactivate old revisions
        continue-on-error: true
        run: |
          OLD_REVISIONS=$(az containerapp revision list \
            --name           "$APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --query "sort_by([?properties.active && name != '${{ steps.deploy-green.outputs.revision }}'], &properties.createdTime)[].name" \
            -o tsv | head -n -1)

          for rev in $OLD_REVISIONS; do
            echo "Deactivating: $rev"
            az containerapp revision deactivate \
              --name           "$APP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --revision       "$rev"
          done

      # ── Step 6: Tag the commit with the semantic version (production only) ─
      - name: Tag production release
        if: inputs.environment == 'production' && inputs.version != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${INPUT_VERSION}"
          if gh api "repos/${GITHUB_REPOSITORY}/git/refs/tags/${TAG}" --silent 2>/dev/null; then
            echo "Tag ${TAG} already exists, skipping."
          else
            gh api "repos/${GITHUB_REPOSITORY}/git/refs" \
              -X POST \
              -f ref="refs/tags/${TAG}" \
              -f sha="${GITHUB_SHA}"
            echo "Tagged ${GITHUB_SHA} as ${TAG}"
          fi

      # ── Step 7: Rollback on failure ───────────────────────────────────────
      - name: Rollback green revision on failure
        if: failure() && steps.deploy-green.outputs.revision != ''
        run: |
          az containerapp revision deactivate \
            --name           "$APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --revision       "${{ steps.deploy-green.outputs.revision }}"
