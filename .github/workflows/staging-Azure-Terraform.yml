# ══════════════════════════════════════════════════════════════════════════════
# staging-Platform-Terraform.yml  –  Platform Provisioning: Staging (Terraform)
# ══════════════════════════════════════════════════════════════════════════════
#
# Purpose:
#   Provisions and manages all Azure infrastructure for the staging environment
#   using Terraform. Delegates execution to the shared reusable workflow
#   (_shared-aca-dev.yml) which handles init, plan, and apply.
#
# Triggers:
#   • push → main  (only when files under infra/staging/** change)
#   • pull_request → main  (plan only — no apply; posts plan to PR)
#   • workflow_dispatch  (manual run; supports optional destroy flag)
#
# Plan vs Apply:
#   • pull_request  → plan output posted as a PR comment; no apply
#   • push/dispatch → plan + auto-approve apply (only if changes detected)
#
# Required GitHub environment secrets (environment: staging):
#   AZURE_CLIENT_ID       – App Registration client ID for OIDC federation
#   AZURE_TENANT_ID       – Azure AD tenant ID
#   AZURE_SUBSCRIPTION_ID – Target Azure subscription ID
# ══════════════════════════════════════════════════════════════════════════════

name: Azure Provision - Staging - Terraform

on:
  push:
    branches: [main]
    paths:
      - 'infra/staging/**'
  pull_request:
    branches: [main]
    paths:
      - 'infra/staging/**'

  workflow_dispatch:
    inputs:
      destroy:
        description: "Destroy resources?"
        type: boolean
        default: false

concurrency:
  group: terraform-staging-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  deploy:
    uses: ./.github/workflows/_shared-aca-dev.yml
    with:
      environment:               staging
      working_directory:         infra/staging
      tf_version:                "1.8.0"
      destroy:                   ${{ inputs.destroy || false }}
      tf_state_storage_account:  myapiterraformstate
      tf_state_container:        tfstate
      tf_state_key:              staging/api.tfstate
      apply_branch:              main
    secrets:
      AZURE_CLIENT_ID:        ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID:        ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID:  ${{ secrets.AZURE_SUBSCRIPTION_ID }}
