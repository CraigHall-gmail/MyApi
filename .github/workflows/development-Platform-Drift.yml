# ══════════════════════════════════════════════════════════════════════════════
# development-Platform-Drift.yml  –  Nightly Infrastructure Drift Check
# ══════════════════════════════════════════════════════════════════════════════
#
# Purpose:
#   Runs a nightly Terraform plan against the development environment to detect
#   drift — i.e. changes made directly to Azure outside of Terraform (via the
#   portal, CLI, or another process) that are no longer in sync with the
#   Terraform state.
#
# Triggers:
#   • schedule  – 01:00 UTC every night
#   • workflow_dispatch  – manual run for on-demand drift checks
#
# Alerting:
#   Drift detected  (plan exit code 2) → creates a GitHub Issue labelled
#                   'infrastructure-drift'. If an issue is already open,
#                   adds a comment to the existing one instead.
#   Plan error      (plan exit code 1) → creates a separate GitHub Issue
#                   labelled 'infrastructure-drift' flagging the error.
#   No drift        (plan exit code 0) → closes any open drift issues with
#                   a resolution comment.
#
# This workflow is plan-only — it never applies changes.
#
# Required GitHub environment secrets (environment: development):
#   AZURE_CLIENT_ID       – App Registration client ID for OIDC federation
#   AZURE_TENANT_ID       – Azure AD tenant ID
#   AZURE_SUBSCRIPTION_ID – Target Azure subscription ID
# ══════════════════════════════════════════════════════════════════════════════

name: Nightly Azure Drift Check

on:
  schedule:
    - cron: '0 1 * * *'   # 01:00 UTC every night
  workflow_dispatch:

permissions:
  id-token: write    # OIDC login
  contents: read
  issues: write      # create / comment / close drift issues

# A newer manual trigger supersedes a running scheduled check.
concurrency:
  group: drift-check-development
  cancel-in-progress: true

jobs:
  drift-check:
    name: Drift Check (development)
    runs-on: ubuntu-latest
    environment: development
    defaults:
      run:
        working-directory: infra/development

    env:
      ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC:        "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.0"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="storage_account_name=myapiterraformstate" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=development/api.tfstate" \
            -backend-config="use_oidc=true"

      # -detailed-exitcode: 0 = no changes, 1 = error, 2 = drift detected.
      # continue-on-error so the alert step always runs regardless of exit code.
      - name: Terraform Plan (drift detection)
        id: plan
        run: |
          terraform plan \
            -var-file="terraform.tfvars" \
            -detailed-exitcode \
            -lock-timeout=2m
        continue-on-error: true

      # Creates, updates, or closes a GitHub Issue depending on the plan result.
      # Uses a consistent label so open issues can be found across runs.
      - name: Manage drift issue
        uses: actions/github-script@v7
        with:
          script: |
            const LABEL   = 'infrastructure-drift';
            const exitcode = '${{ steps.plan.outputs.exitcode }}';
            const runUrl   = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const now      = new Date().toISOString();

            // Ensure the label exists — safe to call if it already does.
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                name:  LABEL,
                color: 'd93f0b',
                description: 'Azure infrastructure has drifted from Terraform state'
              });
            } catch (_) {}

            // Find any open drift issues from previous runs.
            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner:  context.repo.owner,
              repo:   context.repo.repo,
              labels: LABEL,
              state:  'open'
            });

            const MAX = 60000;
            let planOut = `${{ steps.plan.outputs.stdout }}`;
            if (planOut.length > MAX) {
              planOut = planOut.slice(0, MAX) + '\n\n…output truncated — see full run logs';
            }

            if (exitcode === '2') {
              // ── Drift detected ────────────────────────────────────────────
              const body = [
                `### ⚠️ Infrastructure Drift Detected — \`development\``,
                ``,
                `Terraform found changes between the state file and the actual Azure infrastructure.`,
                `Investigate whether these were intentional and either apply or revert them.`,
                ``,
                `**Workflow run:** ${runUrl}`,
                `**Detected at:** ${now}`,
                ``,
                `\`\`\``,
                planOut,
                `\`\`\``
              ].join('\n');

              if (openIssues.length > 0) {
                // Drift is ongoing — add a comment to the existing issue.
                await github.rest.issues.createComment({
                  owner:        context.repo.owner,
                  repo:         context.repo.repo,
                  issue_number: openIssues[0].number,
                  body: [
                    `### Drift still present — ${now}`,
                    ``,
                    `**Workflow run:** ${runUrl}`,
                    ``,
                    `\`\`\``,
                    planOut,
                    `\`\`\``
                  ].join('\n')
                });
                console.log(`Updated existing drift issue #${openIssues[0].number}`);
              } else {
                // First detection — open a new issue.
                const { data: issue } = await github.rest.issues.create({
                  owner:  context.repo.owner,
                  repo:   context.repo.repo,
                  title:  `⚠️ Infrastructure Drift Detected — development`,
                  body:   body,
                  labels: [LABEL]
                });
                console.log(`Opened drift issue #${issue.number}`);
              }

            } else if (exitcode === '1') {
              // ── Plan error ────────────────────────────────────────────────
              const body = [
                `### 🔴 Terraform Plan Error — \`development\``,
                ``,
                `The nightly drift check failed to produce a plan. Manual investigation required.`,
                ``,
                `**Workflow run:** ${runUrl}`,
                `**Occurred at:** ${now}`,
                ``,
                `\`\`\``,
                planOut || '(no output captured — check the workflow logs)',
                `\`\`\``
              ].join('\n');

              if (openIssues.length > 0) {
                await github.rest.issues.createComment({
                  owner:        context.repo.owner,
                  repo:         context.repo.repo,
                  issue_number: openIssues[0].number,
                  body: `### Plan error — ${now}\n\n**Run:** ${runUrl}\n\n\`\`\`\n${planOut}\n\`\`\``
                });
              } else {
                const { data: issue } = await github.rest.issues.create({
                  owner:  context.repo.owner,
                  repo:   context.repo.repo,
                  title:  `🔴 Terraform Plan Error — development`,
                  body:   body,
                  labels: [LABEL]
                });
                console.log(`Opened plan error issue #${issue.number}`);
              }
              // Re-throw so the workflow step is marked failed.
              core.setFailed('Terraform plan returned exit code 1');

            } else {
              // ── No drift (exit code 0) ────────────────────────────────────
              console.log('No drift detected.');
              for (const issue of openIssues) {
                await github.rest.issues.createComment({
                  owner:        context.repo.owner,
                  repo:         context.repo.repo,
                  issue_number: issue.number,
                  body: `✅ No drift detected as of ${now} — closing.\n\n**Workflow run:** ${runUrl}`
                });
                await github.rest.issues.update({
                  owner:        context.repo.owner,
                  repo:         context.repo.repo,
                  issue_number: issue.number,
                  state:        'closed'
                });
                console.log(`Closed resolved drift issue #${issue.number}`);
              }
            }
