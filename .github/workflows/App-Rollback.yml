# ══════════════════════════════════════════════════════════════════════════════
# App-Rollback.yml  –  Manual Rollback: Restore Previous ACA Revision
# ══════════════════════════════════════════════════════════════════════════════
#
# Purpose:
#   Emergency manual workflow to roll back any environment to its previous
#   revision. Automatically identifies the live revision and the most recent
#   active revision before it — no manual revision name required.
#
# How to use:
#   Actions → App - Rollback → Run workflow → select environment
#   No other inputs needed. The workflow discovers revisions automatically.
#
# What it does:
#   1. Resolves the target resource group from the environment input
#   2. Discovers the live revision (100% traffic) and the previous active one
#   3. Activates the previous revision if it was deactivated
#   4. Shifts 100% of traffic to the previous revision
#   5. Deactivates the bad (rolled-back) revision
#   6. Enforces a max of 2 active revisions
#   7. Confirms the final revision state
#
# Concurrency:
#   Shares the same concurrency group as the CD workflow for the selected
#   environment to prevent a rollback and a deploy running simultaneously.
# ══════════════════════════════════════════════════════════════════════════════

name: App - Rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to roll back"
        required: true
        type: choice
        options:
          - development
          - staging
          - production

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

env:
  APP_NAME: myapi

jobs:
  rollback:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment: ${{ inputs.environment }}

    steps:
      # Resolve the resource group for the selected environment.
      - name: Resolve resource group
        id: env-config
        run: |
          case "${{ inputs.environment }}" in
            development) RG="rg-myapi-dev" ;;
            staging)     RG="rg-myapi-staging" ;;
            production)  RG="rg-myapi-production" ;;
          esac
          echo "rg=$RG" >> "$GITHUB_OUTPUT"
          echo "Rolling back ${{ inputs.environment }} in $RG"

      - name: Azure login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── Step 1: Discover current and previous revisions ───────────────────
      - name: Discover revisions
        id: revisions
        run: |
          echo "=== All active revisions ==="
          az containerapp revision list \
            --name           "${{ env.APP_NAME }}" \
            --resource-group "${{ steps.env-config.outputs.rg }}" \
            --query "sort_by([?properties.active], &properties.createdTime)[].{revision:name, traffic:properties.trafficWeight, state:properties.runningState, created:properties.createdTime}" \
            --output table

          CURRENT=$(az containerapp revision list \
            --name           "${{ env.APP_NAME }}" \
            --resource-group "${{ steps.env-config.outputs.rg }}" \
            --query "sort_by([?properties.trafficWeight > \`0\`], &properties.createdTime)[-1].name" \
            -o tsv)

          PREVIOUS=$(az containerapp revision list \
            --name           "${{ env.APP_NAME }}" \
            --resource-group "${{ steps.env-config.outputs.rg }}" \
            --query "sort_by([?properties.active && name != '$CURRENT'], &properties.createdTime)[-1].name" \
            -o tsv)

          if [ -z "$CURRENT" ]; then
            echo "::error::No live revision found (no revision with traffic > 0)"
            exit 1
          fi
          if [ -z "$PREVIOUS" ]; then
            echo "::error::No previous revision found to roll back to — cannot proceed"
            exit 1
          fi

          echo "current=$CURRENT"   >> "$GITHUB_OUTPUT"
          echo "previous=$PREVIOUS" >> "$GITHUB_OUTPUT"
          echo "Rolling back: $CURRENT → $PREVIOUS"

      # ── Step 2: Activate previous revision (if deactivated) ───────────────
      - name: Activate previous revision (if deactivated)
        run: |
          az containerapp revision activate \
            --name           "${{ env.APP_NAME }}" \
            --resource-group "${{ steps.env-config.outputs.rg }}" \
            --revision       "${{ steps.revisions.outputs.previous }}" || true

      # ── Step 3: Shift 100% traffic to previous revision ───────────────────
      - name: Shift traffic to previous revision
        run: |
          az containerapp ingress traffic set \
            --name           "${{ env.APP_NAME }}" \
            --resource-group "${{ steps.env-config.outputs.rg }}" \
            --revision-weight "${{ steps.revisions.outputs.previous }}=100"

      # ── Step 4: Deactivate the bad revision ───────────────────────────────
      - name: Deactivate rolled-back revision
        run: |
          az containerapp revision deactivate \
            --name           "${{ env.APP_NAME }}" \
            --resource-group "${{ steps.env-config.outputs.rg }}" \
            --revision       "${{ steps.revisions.outputs.current }}"

      # ── Step 5: Enforce max 2 active revisions ────────────────────────────
      - name: Enforce max 2 active revisions
        run: |
          EXTRAS=$(az containerapp revision list \
            --name           "${{ env.APP_NAME }}" \
            --resource-group "${{ steps.env-config.outputs.rg }}" \
            --query "sort_by([?properties.active && name != '${{ steps.revisions.outputs.previous }}'], &properties.createdTime)[].name" \
            -o tsv | head -n -1)

          if [ -z "$EXTRAS" ]; then
            echo "No extra revisions to deactivate"
          else
            for rev in $EXTRAS; do
              echo "Deactivating: $rev"
              az containerapp revision deactivate \
                --name           "${{ env.APP_NAME }}" \
                --resource-group "${{ steps.env-config.outputs.rg }}" \
                --revision       "$rev"
            done
          fi

      # ── Step 6: Confirm final state ───────────────────────────────────────
      - name: Confirm final revision state
        run: |
          echo "=== Revision state after rollback ==="
          az containerapp revision list \
            --name           "${{ env.APP_NAME }}" \
            --resource-group "${{ steps.env-config.outputs.rg }}" \
            --query "sort_by([?properties.active], &properties.createdTime)[].{revision:name, traffic:properties.trafficWeight, state:properties.runningState}" \
            --output table
